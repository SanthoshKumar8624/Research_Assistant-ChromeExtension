<!DOCTYPE html>
<html lang="en">
<head>
    <title>Research Assistant</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Research Assistant</h2>
        </div>

        <div class="actions">
            <button id="summarizeBtn">Summarize</button>
            <button id="explainBtn">Explain</button>
            <button id="simplifyBtn">Simplify</button>
            <button id="questionsBtn">Generate Questions</button>
        </div>

        <div id="loading" class="loading-container" style="display:none;">
            <div class="spinner"></div>
            <p>AI is analyzing the content...</p>
        </div>

        <div class="notes">
            <h3>Research Notes</h3>
            <textarea id="notes" placeholder="Take notes here"></textarea>
            <button id="saveNotesBtn">Save Notes</button>
            <button id="clearNotesBtn">Clear Notes</button>
            <button id="copyNotesBtn">Copy Notes</button>
        </div>

        <div id="results"></div>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
